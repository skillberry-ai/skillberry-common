# ============================================================================
# Shared Reusable Workflow: Fix Issues with Bob
# ============================================================================
#
# PURPOSE:
# Automatically fixes GitHub issues using IBM Bob Shell. When an issue is
# labeled with 'fix-with-bob', this workflow:
# 1. Analyzes the issue description and requirements
# 2. Uses Bob Shell to generate code changes that address the issue
# 3. Pushes changes to a branch in the skillberry-bot fork of the calling repo
# 4. Creates a pull request with the proposed fixes
# 5. Provides feedback on the issue with status updates
#
# FORK-PUSH PATTERN:
# Changes are pushed to a branch in the `skillberry-bot/<repo>` fork, then a PR
# is opened from that fork to the upstream repository. The calling repo name is
# derived automatically from `github.repository`.
#
# REQUIRED SECRETS (passed via `secrets: inherit` from caller):
#   BOBSHELL_API_KEY      — Bob Shell API key
#   SKILLBERRY_BOT_TOKEN  — PAT for skillberry-bot with repo + PR permissions
#
# USAGE (in caller repo):
#   jobs:
#     call-fix-issues:
#       uses: skillberry-ai/skillberry-common/.github/workflows/fix-issues-with-bob.yml@main
#       secrets: inherit
# ============================================================================

name: Fix Issues with Bob (shared)

on:
  workflow_call:

jobs:
  fix-issues-with-bob:
    # Only run when the 'fix-with-bob' label is added
    if: github.event.label.name == 'fix-with-bob'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.SKILLBERRY_BOT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          echo "Installing Bob Shell..."
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm

          if command -v bob &> /dev/null; then
            echo "Bob Shell installed successfully"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi

      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          echo "Bob Shell authentication configured successfully"

      - name: Get Issue Details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT

          # Always fetch from GitHub API to ensure consistent JSON handling
          ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER})

          ISSUE_TITLE=$(echo "${ISSUE_DATA}" | jq -r '.title')
          ISSUE_BODY=$(echo "${ISSUE_DATA}" | jq -r '.body // ""')

          {
            echo "issue_title<<TITLE_EOF"
            echo "${ISSUE_TITLE}"
            echo "TITLE_EOF"
            echo "issue_body<<BODY_EOF"
            echo "${ISSUE_BODY}"
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Branch for Fix
        run: |
          BRANCH_NAME="fix-issue-${{ steps.issue.outputs.issue_number }}"
          git checkout -b "${BRANCH_NAME}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

      - name: Execute Bob to Fix Issue
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            PROMPT=$(cat <<'EOF'
            Fix GitHub issue #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}

            Repository: ${{ github.repository }}
            Issue URL: ${{ github.event.issue.html_url }}

            Issue Description:
            ${{ steps.issue.outputs.issue_body }}

            Please analyze this issue and make all necessary code changes to fix it.
            Ensure the changes are complete, follow best practices, and resolve the issue.
            EOF
            )

            # --accept-license: required on first run in a fresh CI environment
            # --yolo: required to enable file writing (disabled by default)
            bob --accept-license --yolo -p "${PROMPT}"
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and Push Changes
        if: steps.changes.outputs.has_changes == 'true'
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"

          git add -A
          git reset .bob/ || true
          git commit -m "Fix issue #${{ steps.issue.outputs.issue_number }}: ${{ steps.issue.outputs.issue_title }}"

          # Check whether the skillberry-bot fork exists for this repo.
          # If it does, push there (fork-PR pattern); otherwise push directly to origin.
          FORK_EXISTS=false
          if gh api "repos/skillberry-bot/${REPO_NAME}" --silent 2>/dev/null; then
            FORK_EXISTS=true
          fi

          if [ "${FORK_EXISTS}" = "true" ]; then
            echo "Fork skillberry-bot/${REPO_NAME} found — pushing to fork"
            git remote add skillberry-bot \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/skillberry-bot/${REPO_NAME}.git"
            git push -f -u skillberry-bot "${BRANCH_NAME}"
            echo "push_target=fork" >> $GITHUB_OUTPUT
          else
            echo "Fork skillberry-bot/${REPO_NAME} not found — pushing directly to origin"
            git remote set-url origin \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git push -f -u origin "${BRANCH_NAME}"
            echo "push_target=origin" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          # Use the repo's actual default branch, not a hardcoded 'main'
          DEFAULT_BRANCH=$(gh api "repos/${{ github.repository }}" --jq '.default_branch')

          DIFF_STATS=$(git diff "origin/${DEFAULT_BRANCH}...HEAD" --stat || echo "Unable to generate diff stats")

          PR_BODY=$(cat <<EOF
          This PR was automatically generated by Bob Shell to fix issue #${{ steps.issue.outputs.issue_number }}.

          ## Issue Details
          ${{ steps.issue.outputs.issue_body }}

          ## Changes
          Bob Shell analyzed the issue and applied the following fixes:
          ${DIFF_STATS}

          Closes #${{ steps.issue.outputs.issue_number }}
          EOF
          )

          # Set --head to fork branch when fork was used, otherwise same-repo branch
          if [ "${{ steps.push.outputs.push_target }}" = "fork" ]; then
            REPO_NAME="${{ github.event.repository.name }}"
            HEAD_REF="skillberry-bot:${BRANCH_NAME}"
          else
            HEAD_REF="${BRANCH_NAME}"
          fi

          PR_URL=$(gh pr create \
            --repo ${{ github.repository }} \
            --title "Fix: Issue #${{ steps.issue.outputs.issue_number }} - ${{ steps.issue.outputs.issue_title }}" \
            --body "${PR_BODY}" \
            --base "${DEFAULT_BRANCH}" \
            --head "${HEAD_REF}")

          echo "PR_URL=${PR_URL}" >> $GITHUB_ENV

          PR_NUMBER=$(echo "${PR_URL}" | grep -oP '\d+$')
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV

          gh pr edit "${PR_NUMBER}" --repo ${{ github.repository }} --add-label "fix-with-bob"
          echo "✓ Added 'fix-with-bob' label to PR #${PR_NUMBER}"

      - name: Comment on Issue
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "🤖 Bob Shell has analyzed this issue and created a pull request with a proposed fix. Please review the changes."

      - name: Comment on Issue - No Changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "🤖 Bob Shell analyzed this issue but did not generate any code changes. Manual intervention may be required."

      - name: Handle Errors
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLBERRY_BOT_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.issue_number }} \
            --body "❌ Bob Shell encountered an error while trying to fix this issue. Please check the workflow logs for details."

# Made with Bob
