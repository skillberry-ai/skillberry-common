# ============================================================================
# Shared Reusable Workflow: CodeQL Security Scan
# ============================================================================
#
# PURPOSE:
# Runs GitHub CodeQL security analysis against the calling repository.
# Called via workflow_call from each repo's thin caller workflow.
#
# INPUTS:
#   languages: comma-separated CodeQL language names (default: python,javascript)
#
# USAGE (in caller repo):
#   jobs:
#     call-codeql:
#       uses: skillberry-ai/skillberry-common/.github/workflows/codeql.yml@main
#       secrets: inherit
#       with:
#         languages: python,javascript
# ============================================================================

name: CodeQL (shared)

on:
  workflow_call:
    inputs:
      languages:
        description: 'Comma-separated CodeQL language names to analyze'
        type: string
        default: 'python,javascript'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(format('[{0}]', join(split(inputs.languages, ','), ','))) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

