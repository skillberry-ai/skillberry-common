# ============================================================================
# Shared Reusable Workflow: CodeQL Security Scan
# ============================================================================
#
# PURPOSE:
# Runs GitHub CodeQL security analysis against the calling repository.
# Called via workflow_call from each repo's thin caller workflow.
#
# INPUTS:
#   languages: JSON array string of CodeQL language names
#              default: '["python","javascript"]'
#
# USAGE (in caller repo):
#   jobs:
#     call-codeql:
#       uses: skillberry-ai/skillberry-common/.github/workflows/codeql.yml@main
#       secrets: inherit
#       with:
#         languages: '["python","javascript"]'
# ============================================================================

name: CodeQL (shared)

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array string of CodeQL language names, e.g. ''["python","javascript"]'''
        type: string
        default: '["python","javascript"]'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(inputs.languages) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

